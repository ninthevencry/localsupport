<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Topsham Tech">
    <meta property="og:description" content="Friendly local IT support for homes and businesses.">
    <meta property="og:image" content="https://www.topshamtech.co.uk/images/facebook-share.jpg">
    <meta property="og:url" content="https://www.topshamtech.co.uk">
    <meta property="og:type" content="website">
    <title>Topsham Tech | Initiate Connection - Premium IT Support</title>
    <meta name="description"
        content="Get in touch with Topsham Tech. Enter your details and query to connect with independent IT support and advice.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="contact-page-layout">

    <!-- HEADER NAVIGATION -->
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo">
                <img src="./images/techlogo.png" alt="logo" width="100">
                TOPSHAM<span class="cyan-accent">TECH</span>
            </a>
            <nav class="nav-links">
                <a href="index.html#services" class="nav-link">Services</a>
                <a href="index.html#about" class="nav-link">About Me</a>
                <a href="index.html" class="nav-link">Home</a>
            </nav>
            <div class="header-actions">
                <a href="index.html" class="btn btn-outline btn-sm">Home Page</a>
            </div>
        </div>
    </header>

    <!-- CONTACT FORM SECTION -->
    <main class="contact-main">
        <div class="contact-bg-glow"></div>
        <div class="hud-grid"></div>

        <div class="container small-container">
            <div class="contact-header text-center">
                <h1 class="cyan-glow">Support Enquiry</h1>
                <br />
                <p class="section-subtitle">Email me at <a
                        href="mailto:info@topshamtech.co.uk"><strong>info@topshamtech.co.uk</strong></a>
                    or enter your details and query below. I will respond as quickly as
                    possible to help resolve your issues.</p>
            </div>

            <!-- Glassmorphic Form Card -->
            <div class="glass-card contact-form-card hover-glow">
                <form method="POST" action="https://api.web3forms.com/submit" name="contact-us">
                    <!-- Web3Forms Access Key -->
                    <input type="hidden" name="access_key" value="55f1fe8b-f8ee-4991-8543-78d23961f910">

                    <!-- Web3Forms Custom Redirect (Optional, but ensures they stay on site. By default it shows a Web3Forms success page if omitted) -->
                    <!-- We'll let it use the default or a standard fallback -->

                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Enter your full name"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="you@company.com"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea class="form-control" id="message" name="message" rows="6"
                            placeholder="Describe your IT issue or support requirements..." required></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-cyan-glow btn-lg btn-block">
                            <span class="btn-text">SUBMIT ENQUIRY</span>
                            <span class="btn-glow-layer"></span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Topsham Tech. All Rights Reserved. Secure transmission enabled.</p>
                <p><a href="https://www.facebook.com/topshamtechuk"><img src="./images/facebook-logo.png" width="50"
                            alt="Facebook"></a></p>
            </div>
        </div>
    </footer>

</body>

</html>
